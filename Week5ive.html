function simpleHash(str) {

    const c = str.charCodeAt(i);
    h = (h << 5) - h + c;
    h |= 0;
  }
  return Math.abs(h).toString(36).toUpperCase();
}

      const qs = new URLSearchParams({

        redirect: 'follow'
      });
      return await res.json();
    } catch (e) {
      return {
        ok: false,
        error: e.message
      };
    }
  },
  async post(action, body = {}) {
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify({
          action,
          ...body
        })

        ok: false,

/* ----------------------------------------------------------------
   세금 계산 (한국 복권)
     5만원 이하: 비과세
     5만 ~ 3억:  22% (소득세 20% + 주민세 2%)
     3억 초과:   33% (소득세 30% + 주민세 3%) — 3억 초과분에만
---------------------------------------------------------------- */
function taxOf(amount) {
  if (amount <= 50_000) {
    return {
      tax: 0,
      net: amount,
      brackets: [{
        on: amount,
        rate: 0,
        tax: 0,
        label: "5만원 이하",
        desc: "비과세"
      }]
    };
  }
  if (amount <= 300_000_000) {
    const tax = Math.round(amount * 0.22);
    return {
      tax,
      net: amount - tax,
      brackets: [{
        on: amount,
        rate: 0.22,
        tax,
        label: "5만 – 3억 구간",
        desc: "소득세 20% + 주민세 2%"
      }]
    };
  }
  const baseAmt = 300_000_000;
  const overAmt = amount - baseAmt;
  const baseTax = Math.round(baseAmt * 0.22);
  const overTax = Math.round(overAmt * 0.33);
  const tax = baseTax + overTax;
  return {
    tax,
    net: amount - tax,
    brackets: [{
      on: baseAmt,
      rate: 0.22,
      tax: baseTax,
      label: "3억 이하 부분",
      desc: "소득세 20% + 주민세 2%"
    }, {
      on: overAmt,
      rate: 0.33,
      tax: overTax,
      label: "3억 초과 부분",
      desc: "소득세 30% + 주민세 3%"
    }]
  };
}

/* ----------------------------------------------------------------
   금액 포맷팅
---------------------------------------------------------------- */
function won(n) {
  if (n >= 100_000_000) {
    const eok = n / 100_000_000;
    return `${eok % 1 === 0 ? eok : eok.toFixed(1)}억`;
  }
  if (n >= 10_000) {
    const man = Math.round(n / 10_000);
    return `${man.toLocaleString()}만`;
  }
  return n.toLocaleString();
}
function wonFull(n) {
  return `₩${n.toLocaleString("ko-KR")}`;
}
