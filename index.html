const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUMY4CcSUKEYzpxGXPKqPVLPcKJYmTtCVoMfdaBpd5FQINZUSLSJWfy8TNn2vRXd_vvg/exec';

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i); h = ((h << 5) - h) + c; h |= 0;
  }
  return Math.abs(h).toString(36).toUpperCase();
}

const W5Api = {
  async get(action, params = {}) {
    try {
      const qs  = new URLSearchParams({ action, ...params });
      const res = await fetch(`${SCRIPT_URL}?${qs}`, { redirect:'follow' });
      return await res.json();
    } catch(e) { return { ok:false, error:e.message }; }
  },
  async post(action, body = {}) {
    try {
      const res = await fetch(SCRIPT_URL, {
        method:'POST', redirect:'follow',
        body: JSON.stringify({ action, ...body }),
      });
      return await res.json();
    } catch(e) { return { ok:false, error:e.message }; }
  },
  getDraws:     ()                            => W5Api.get('getDraws'),
  getNotices:   ()                            => W5Api.get('getNotices'),
  getMyNumbers: (userID)                      => W5Api.get('getMyNumbers', { userID }),
  login:        (email, pwHash)               => W5Api.get('checkLogin',   { email, pwHash }),
  register:     (email, name, pwHash)         => W5Api.post('register',    { email, name, pwHash }),
  saveNumbers:  (userID, round, name, nums)   => W5Api.post('saveNumbers', { userID, round, name, nums }),
  deleteNumber: (id, userID)                  => W5Api.post('deleteNumber', { id, userID }),
  updatePlan:   (userID, plan, months = 1)    => W5Api.post('updatePlan',   { userID, plan, months }),
};

/* -------- Festive confetti dots (subtle) -------- */
const Confetti = ({ density = 14, seed = 1 }) => {
  // Deterministic pseudo-random
  const dots = [];
  for (let i = 0; i < density; i++) {
    const r = (Math.sin(i * 12.9898 + seed * 78.233) * 43758.5453) % 1;
    const r2 = (Math.sin(i * 7.1357 + seed * 31.213) * 12345.678) % 1;
    const r3 = (Math.sin(i * 3.7345 + seed * 91.111) * 56789.123) % 1;
    const x = Math.abs(r) * 100;
    const y = Math.abs(r2) * 100;
    const c = Math.abs(r3);
    const color =
      c < 0.4 ? W5.gold :
      c < 0.7 ? W5.goldHi :
                "rgba(255,255,255,0.4)";
    const size = 2 + Math.abs(r3) * 4;
    dots.push({ x, y, color, size, rot: r3 * 360 });
  }
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden",
                  pointerEvents: "none" }}>
      {dots.map((d, i) => (
        <div key={i} style={{
          position: "absolute", left: `${d.x}%`, top: `${d.y}%`,
          width: d.size, height: d.size * (i % 3 === 0 ? 2.5 : 1),
          borderRadius: i % 3 === 0 ? 1 : "50%",
          background: d.color, opacity: 0.55,
          transform: `rotate(${d.rot}deg)`,
        }}></div>
      ))}
    </div>
  );
};

const FreqBar = () => {
  // Generate a frequency-like distribution for 1-45
  const data = [];
  for (let i = 1; i <= 45; i++) {
    const r = Math.abs((Math.sin(i * 1.7 + 0.3) * 0.5 + 0.5));
    const r2 = Math.abs((Math.cos(i * 2.3 + 1.1) * 0.5 + 0.5));
    data.push(Math.round((r * 0.6 + r2 * 0.4) * 6 + 1));
  }
  const max = Math.max(...data);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 2,
                    height: 80 }}>
        {data.map((v, i) => {
          const n = i + 1;
          const c =
            n <= 10 ? W5.ballYellow :
            n <= 20 ? W5.ballBlue :
            n <= 30 ? W5.ballRed :
            n <= 40 ? W5.ballGray : W5.ballGreen;
          return (
            <div key={i} style={{
              flex: 1,
              height: `${(v / max) * 100}%`,
              background: `linear-gradient(to top, ${c}88, ${c})`,
              borderRadius: "2px 2px 0 0",
              minHeight: 2,
            }}></div>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between",
                    marginTop: 6,
                    fontSize: 9, color: W5.text4, fontWeight: 700 }}>
        <span>1</span><span>10</span><span>20</span>
        <span>30</span><span>40</span><span>45</span>
      </div>
    </div>
  );
};

/* ----------------------------------------------------------------
   회차의 1등 당첨금을 기준으로 등수별 예상 금액을 계산.
   동행복권 배분율 (통계적 평균):
     1등: 총액 75% / N분의 1
     2등: 총액 12.5%
     3등: 총액 12.5%
     4등: 고정 5만원
     5등: 고정 5천원
   여기서는 "1등 1인 수령액"을 입력값(jackpot1)으로 받아 단순화.
---------------------------------------------------------------- */
function tiersFromJackpot(jackpot1) {
  // 경험치: 2등은 1등의 약 1/60, 3등은 약 1/2000
  return [
    { rank: "1등", amount: jackpot1, color: W5.gold,
      odds: "8,145,060분의 1",
      bg: `linear-gradient(135deg, #F4B400 0%, #A6700A 100%)`,

      color: "#69C8F2", odds: "1,357,510분의 1",
      bg: `linear-gradient(135deg, #2A6E92 0%, #69C8F2 100%)`,
      onText: "#fff" },
    { rank: "3등", amount: Math.round(jackpot1 / 2000),

      onText: W5.ink },
  ];
}

/* ----------------------------------------------------------------
   세금 계산 (한국 복권)
     5만원 이하: 비과세
     5만 ~ 3억:  22% (소득세 20% + 주민세 2%)
     3억 초과:   33% (소득세 30% + 주민세 3%) — 3억 초과분에만
---------------------------------------------------------------- */
function taxOf(amount) {
  if (amount <= 50_000) {
    return { tax: 0, net: amount, brackets: [
      { on: amount, rate: 0, tax: 0,
        label: "5만원 이하", desc: "비과세" }
    ] };
  }
  if (amount <= 300_000_000) {
    const tax = Math.round(amount * 0.22);
    return {
      tax, net: amount - tax,
      brackets: [
        { on: amount, rate: 0.22, tax,
          label: "5만 – 3억 구간", desc: "소득세 20% + 주민세 2%" }
      ],
    };
  }
  const baseAmt = 300_000_000;
  const overAmt = amount - baseAmt;
  const baseTax = Math.round(baseAmt * 0.22);
  const overTax = Math.round(overAmt * 0.33);
  const tax = baseTax + overTax;
  return {
    tax, net: amount - tax,
    brackets: [
      { on: baseAmt, rate: 0.22, tax: baseTax,
        label: "3억 이하 부분", desc: "소득세 20% + 주민세 2%" },
      { on: overAmt, rate: 0.33, tax: overTax,
        label: "3억 초과 부분", desc: "소득세 30% + 주민세 3%" },
    ],
  };
}

/* ----------------------------------------------------------------
   금액 포맷팅
---------------------------------------------------------------- */
function won(n) {
  if (n >= 100_000_000) {
    const eok = n / 100_000_000;
    return `${eok % 1 === 0 ? eok : eok.toFixed(1)}억`;
  }
  if (n >= 10_000) {
    const man = Math.round(n / 10_000);
    return `${man.toLocaleString()}만`;
  }
  return n.toLocaleString();
}
function wonFull(n) {
  return `₩${n.toLocaleString("ko-KR")}`;
}

function itemsForAmount(amount) {
  if (amount >= 1_000_000_000) return SPEND_BUCKETS.XXL;
  if (amount >= 100_000_000)   return SPEND_BUCKETS.XL;
  if (amount >= 10_000_000)    return SPEND_BUCKETS.L;
  if (amount >= 1_000_000)     return SPEND_BUCKETS.M;
  if (amount >= 50_000)        return SPEND_BUCKETS.S;
  return SPEND_BUCKETS.XS;
}
